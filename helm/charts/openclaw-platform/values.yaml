# Override the Helm fullname (default: {release}-{chart}).
# The ApplicationSet sets this to the tenant name so that resource names
# (Deployment, ConfigMap, Secret ref) match the Lambda naming convention.
fullnameOverride: ""

image:
  # Default: ghcr.io/openclaw/openclaw (direct pull, no credentials needed)
  # With ECR pull-through cache: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ghcr/openclaw/openclaw
  repository: ghcr.io/openclaw/openclaw
  tag: ""  # Defaults to Chart.AppVersion if empty
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

service:
  type: ClusterIP
  port: 18789

persistence:
  enabled: true
  storageClass: "efs-sc"
  accessMode: ReadWriteMany
  size: 10Gi

serviceAccount:
  annotations: {}

ingress:
  enabled: false
  className: alb
  host: ""
  certificateArn: ""
  annotations:
    alb.ingress.kubernetes.io/group.name: openclaw-shared
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip

networkPolicy:
  enabled: true

resourceQuota:
  enabled: true
  cpu: "4"
  memory: 8Gi
  pods: "10"

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

scaleToZero:
  enabled: false
  idleTimeout: 900
  minReplicas: 0
  maxReplicas: 1

config:
  gateway:
    port: 18789
    mode: local
    bind: lan
    trustedProxies:
      - "10.0.0.0/16"
    auth:
      mode: token
      token:
        source: exec
        provider: aws-sm
        id: gateway-token
    controlUi:
      allowedOrigins: []
      # Device auth requires OAuth device flow support. Set to true only for
      # web-only deployments where device auth is not needed.
      dangerouslyDisableDeviceAuth: true
  
  browser:
    enabled: false

  tools:
    profile: full
    deny:
      - gateway
      - cron
      - sessions_spawn
      - sessions_send
    fs:
      workspaceOnly: true
    exec:
      security: deny
    elevated:
      enabled: false
    web:
      search:
        enabled: false
      fetch:
        enabled: true

  logging:
    level: info
    consoleLevel: info
    consoleStyle: compact
    redactSensitive: tools
  
  agents:
    defaults:
      workspace: /home/node/.openclaw/workspace
      userTimezone: UTC
      timeoutSeconds: 600
      maxConcurrent: 1
      model:
        primary: amazon-bedrock/global.anthropic.claude-opus-4-6-v1
        fallbacks:
          - amazon-bedrock/global.anthropic.claude-sonnet-4-6
          - amazon-bedrock/deepseek.v3.2
      # Model list is for reference only. All models are accessed through Amazon Bedrock.
      # Users must verify model availability in their region and comply with each
      # model provider's terms of service.
      models:
        amazon-bedrock/global.anthropic.claude-opus-4-6-v1:
          alias: opus
          params:
            maxTokens: 16384
            cacheRetention: long
            thinking: adaptive
        amazon-bedrock/global.anthropic.claude-sonnet-4-6:
          alias: sonnet
          params:
            maxTokens: 8192
            cacheRetention: long
            thinking: adaptive
        amazon-bedrock/openai.gpt-oss-120b-1:0:
          params:
            maxTokens: 4096
        amazon-bedrock/qwen.qwen3-coder-480b-a35b-v1:0:
          params:
            maxTokens: 8192
        amazon-bedrock/moonshot.kimi-k2-thinking:
          params:
            maxTokens: 8192
        amazon-bedrock/deepseek.v3.2:
          params:
            maxTokens: 8192
    list:
      - id: main
        default: true
        identity:
          name: OpenClaw
          emoji: "🦞"

  models:
    bedrockDiscovery:
      enabled: true
      region: ""  # Injected by ApplicationSet from deploy-platform.sh
  
  session:
    scope: per-sender
    store: /home/node/.openclaw/sessions
    reset:
      mode: idle
      idleMinutes: 60
  
  secrets:
    providers:
      aws-sm:
        source: exec
        command: /usr/local/bin/node
        allowInsecurePath: true
        args:
          - /home/node/.openclaw/workspace/bin/fetch-secret.mjs
        timeoutMs: 10000
        passEnv:
          - AWS_CONTAINER_CREDENTIALS_FULL_URI
          - AWS_CONTAINER_AUTHORIZATION_TOKEN
          - AWS_REGION
          - TENANT_NAMESPACE
          - NODE_PATH

# Skills to install via clawhub in the init-skills init container.
# On first launch (empty EFS volume), each skill takes ~20s to install from npm.
# Subsequent launches skip installation (skills persist on EFS).
# To eliminate first-launch latency, pre-bake skills into the container image.
skills:
  - weather
  - gog

# Gateway token is created by PostConfirmation Lambda as a K8s Secret
# named {tenant}-gateway-token. See docs/naming-convention.md.

env: {}

envFrom: []

nodeOptions:
  # Cap Node.js heap to prevent silent OOM kills (exit 137).
  # Set ~512Mi below the memory limit. Set to 0 to disable.
  maxOldSpaceSize: 1536

nodeSelector: {}

tolerations: []

affinity: {}

fetchSecret: |
  #!/usr/bin/env node
  import { SecretsManagerClient, GetSecretValueCommand } from "@aws-sdk/client-secrets-manager";
  const input = JSON.parse(await new Response(process.stdin).text());
  const sm = new SecretsManagerClient({ region: process.env.AWS_REGION });
  const ns = process.env.TENANT_NAMESPACE;
  const result = {};
  for (const id of input.ids) {
    const { SecretString } = await sm.send(new GetSecretValueCommand({ SecretId: `openclaw/${ns}/${id}` }));
    result[id] = SecretString;
  }
  process.stdout.write(JSON.stringify(result));

# Gateway API (replaces Ingress for path-based routing)
gateway:
  enabled: false
  gatewayName: openclaw-gateway
  gatewayNamespace: openclaw-system
  listenerName: "https"  # "https" for custom domain, "http" for no-domain mode
  domain: ""
